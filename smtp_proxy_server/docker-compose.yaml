services:
  smtp_proxy_server:
    # Override SMTP_PROXY_IMAGE if you publish the image under a different GitHub owner or organization.
    image: ${SMTP_PROXY_IMAGE:-ghcr.io/linkmaq/cloudflare_temp_email/smtp_proxy_server:latest}
    # build:
    #   context: .
    #   dockerfile: dockerfile
    container_name: "smtp_proxy_server"
    ports:
      - "8025:8025"
      - "11143:11143"
    environment:
      - proxy_url=https://temp-email-api.xxx.xxx
      - port=8025
      - imap_port=11143
